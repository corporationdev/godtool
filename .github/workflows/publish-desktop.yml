name: Publish Desktop App
run-name: "${{ format('publish desktop {0}', github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (e.g. v1.4.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    environment: Production

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: mac
            cli-asset: executor-darwin-arm64.zip
          - os: macos-latest
            arch: x64
            platform: mac
            cli-asset: executor-darwin-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load Apple signing secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CSC_LINK: op://godtool-prod/Apple/csc-link
          CSC_KEY_PASSWORD: op://godtool-prod/Apple/csc-key-password
          APPLE_API_KEY_BASE64: op://godtool-prod/Apple/apple-api-key-base64
          APPLE_API_KEY_ID: op://godtool-prod/Apple/apple-api-key-id
          APPLE_API_ISSUER: op://godtool-prod/Apple/apple-api-issuer

      - name: Build web app
        run: bun run build
        working-directory: apps/local

      - name: Download and extract CLI sidecar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apps/desktop/resources
          gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" --pattern "${{ matrix.cli-asset }}" --dir /tmp/cli-download
          cd /tmp/cli-download
          if [[ "${{ matrix.cli-asset }}" == *.tar.gz ]]; then
            tar -xzf "${{ matrix.cli-asset }}"
          else
            unzip -o "${{ matrix.cli-asset }}"
          fi
          cp executor "${{ github.workspace }}/apps/desktop/resources/executor"
          chmod +x "${{ github.workspace }}/apps/desktop/resources/executor"
          if [ -f emscripten-module.wasm ]; then
            cp emscripten-module.wasm "${{ github.workspace }}/apps/desktop/resources/"
          fi

      - name: Build desktop app (TypeScript)
        run: bunx tsc -p tsconfig.json
        working-directory: apps/desktop

      - name: Build Computer Use sidecar
        if: matrix.platform == 'mac'
        run: |
          node scripts/build-computer-use-sidecar.js --arch "${{ matrix.arch }}"
          test -x "resources/computer-use/computer-use-darwin-${{ matrix.arch }}"
          file "resources/computer-use/computer-use-darwin-${{ matrix.arch }}"
        working-directory: apps/desktop

      - name: Prepare Apple notarization key
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY_BASE64"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"
          echo "Prepared Apple signing inputs for ${{ matrix.platform }}-${{ matrix.arch }}."

      - name: Build desktop distributables
        timeout-minutes: 60
        env:
          DEBUG: "electron-builder,electron-builder:*,electron-notarize*,@electron/notarize*"
          ELECTRON_BUILDER_DEBUG: "true"
        run: |
          set -o pipefail

          log_path="$RUNNER_TEMP/electron-builder-${{ matrix.platform }}-${{ matrix.arch }}.log"
          started_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Starting electron-builder for ${{ matrix.platform }}-${{ matrix.arch }} at ${started_at}."
          echo "Writing detailed log to ${log_path}."

          (
            while true; do
              sleep 60
              echo "::group::electron-builder heartbeat ${{ matrix.platform }}-${{ matrix.arch }} $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              ps -axo pid,ppid,etime,command \
                | grep -E 'electron-builder|app-builder|codesign|notarytool|stapler|hdiutil|ditto|productbuild|xcrun|security' \
                | grep -v grep \
                || echo "No matching signing/build subprocesses found."
              echo "::endgroup::"
            done
          ) &
          heartbeat_pid="$!"

          cleanup() {
            kill "$heartbeat_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} 2>&1 | tee "$log_path"
        working-directory: apps/desktop

      - name: Verify Computer Use sidecar bundle
        if: matrix.platform == 'mac'
        run: |
          sidecar_path="$(find release -path "*GODTOOL.app/Contents/Resources/computer-use/computer-use-darwin-${{ matrix.arch }}" -type f -print -quit)"
          if [ -z "$sidecar_path" ]; then
            echo "Computer Use sidecar was not bundled into GODTOOL.app" >&2
            find release -maxdepth 6 -print
            exit 1
          fi
          test -x "$sidecar_path"
          file "$sidecar_path"
        working-directory: apps/desktop

      - name: Prepare update metadata
        if: matrix.platform == 'mac'
        run: |
          metadata="release/latest-mac.yml"
          arch_metadata="release/latest-${{ matrix.arch }}-mac.yml"
          if [ -f "$metadata" ]; then
            cp "$metadata" "$arch_metadata"
            echo "Prepared $arch_metadata for ${{ matrix.arch }} auto-updates."
          else
            echo "No $metadata file was generated."
          fi
        working-directory: apps/desktop

      - name: Inspect desktop release output
        if: always()
        run: |
          if [ -d release ]; then
            find release -maxdepth 3 -type f -print -exec ls -lh {} \;
          else
            echo "No release directory was created."
          fi
        working-directory: apps/desktop

      - name: Upload electron-builder diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-builder-diagnostics-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/electron-builder-${{ matrix.platform }}-${{ matrix.arch }}.log
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*-mac.zip
            apps/desktop/release/latest-${{ matrix.arch }}-mac.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts -type f \( -name "*.dmg" -o -name "*-mac.zip" \) | while read file; do
            echo "Uploading: $file"
            gh release upload "${{ inputs.tag }}" "$file" --repo "${{ github.repository }}" --clobber || true
          done
          find artifacts -type f \( -name "*.yml" -o -name "*.blockmap" \) | while read file; do
            echo "Uploading updater metadata: $file"
            gh release upload "${{ inputs.tag }}" "$file" --repo "${{ github.repository }}" --clobber || true
          done
