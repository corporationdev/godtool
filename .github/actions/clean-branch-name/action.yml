name: Clean Branch Name
description: Normalize a branch name for preview stages and Neon branch names

inputs:
  branch:
    description: The branch to clean
    required: true

outputs:
  clean_branch_name:
    description: The normalized branch name
    value: ${{ steps.clean_branch_name.outputs.clean_branch_name }}

runs:
  using: composite
  steps:
    - id: clean_branch_name
      shell: bash
      run: |
        branch_name="${{ inputs.branch }}"

        clean_branch_hash=$(printf "%s" "$branch_name" | sha256sum | cut -c1-8)
        clean_branch_slug=$(echo "$branch_name" | tr '[:upper:]' '[:lower:]')
        clean_branch_slug="${clean_branch_slug//[^a-z0-9-]/-}"
        clean_branch_slug=$(echo "$clean_branch_slug" | sed 's/-\{2,\}/-/g; s/^-//; s/-$//')
        clean_branch_slug="${clean_branch_slug:0:40}"
        clean_branch_slug=$(echo "$clean_branch_slug" | sed 's/-$//')
        if [ -z "$clean_branch_slug" ]; then
          clean_branch_slug="branch"
        fi
        clean_branch_name="${clean_branch_slug}-${clean_branch_hash}"

        echo "clean_branch_name=${clean_branch_name}" >> "$GITHUB_OUTPUT"
        echo "CLEAN_BRANCH_NAME=${clean_branch_name}" >> "$GITHUB_ENV"
