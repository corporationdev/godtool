name: Setup
description: Setup Node, Bun, and install dependencies

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.11"

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
